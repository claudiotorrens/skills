interface:
  display_name: "AudioClaw Skills Voice Reply"
  short_description: "AudioClaw dynamic voice and emotion routing"
  default_prompt: "Use $audioclaw-skills-voice-reply to turn a PicoClaw or OpenClaw reply into SenseAudio speech. For PicoClaw on Feishu, prefer the PicoClaw wrapper and let it send the audio directly through Feishu instead of using send_file or sending MEDIA paths as text. After the audio is sent, do not add an extra text confirmation unless the user asked for text too."
